name: NeuCockpit Product Release

on:
  workflow_dispatch:
  push:
    tags:
      - "neucockpit-v*"

env:
  NEURON_SKIP_QWEN_GGUF: "1"   # Skip bundling the 3 GB GGUF in CI — users download on first run

jobs:
  windows-x64:
    name: Windows x64 installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build NeuCockpit Windows installer
        shell: pwsh
        run: .\scripts\build_neucockpit_product.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-windows-x64
          path: installer_output/NeuCockpitSetup_v1.0_windows_x64.exe

  linux-x64:
    name: Linux x64 tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-x64
          path: dist/release/NeuCockpit-v1.0-linux-x64.tar.gz

  macos-arm64:
    name: macOS ARM64 DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-arm64
          path: dist/release/NeuCockpit-v1.0-macos.dmg

  upload-to-r2:
    name: Upload builds to Cloudflare R2
    runs-on: ubuntu-latest
    needs: [windows-x64, linux-x64, macos-arm64]
    if: always() && (needs.windows-x64.result == 'success' || needs.linux-x64.result == 'success' || needs.macos-arm64.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Install AWS CLI
        run: |
          sudo apt-get update && sudo apt-get install -y awscli

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # Upload Windows x64
          if [ -f "artifacts/NeuCockpit-v1.0-windows-x64/NeuCockpitSetup_v1.0_windows_x64.exe" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-windows-x64/NeuCockpitSetup_v1.0_windows_x64.exe" \
              "s3://zerox-downloads/NeuCockpitSetup_v1.0_windows_x64.exe" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/octet-stream"
            echo "✅ Uploaded Windows x64"
          fi

          # Upload Linux x64
          if [ -f "artifacts/NeuCockpit-v1.0-linux-x64/NeuCockpit-v1.0-linux-x64.tar.gz" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-linux-x64/NeuCockpit-v1.0-linux-x64.tar.gz" \
              "s3://zerox-downloads/NeuCockpit-v1.0-linux-x64.tar.gz" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/gzip"
            echo "✅ Uploaded Linux x64"
          fi

          # Upload macOS ARM64
          if [ -f "artifacts/NeuCockpit-v1.0-macos-arm64/NeuCockpit-v1.0-macos.dmg" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-macos-arm64/NeuCockpit-v1.0-macos.dmg" \
              "s3://zerox-downloads/NeuCockpit-v1.0-macos-arm64.dmg" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/octet-stream"
            echo "✅ Uploaded macOS ARM64"
          fi

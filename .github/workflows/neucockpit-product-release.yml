name: NeuCockpit Product Release

on:
  workflow_dispatch:
  push:
    tags:
      - "neucockpit-v*"

env:
  NEURON_SKIP_QWEN_GGUF: "1"   # Users download the 3 GB GGUF on first run

jobs:
  # ─────────────────────── Linux x64 ───────────────────────
  linux-x64:
    name: Linux x64 tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-x64
          path: dist/release/NeuCockpit-v1.0-linux-x64.tar.gz

  # ─────────────────────── Linux ARM64 ───────────────────────
  linux-arm64:
    name: Linux ARM64 tarball
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux ARM64 package
        run: |
          bash scripts/build_neucockpit_linux.sh
          # Rename to distinguish ARM64
          mv dist/release/NeuCockpit-v1.0-linux-x64.tar.gz dist/release/NeuCockpit-v1.0-linux-arm64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-arm64
          path: dist/release/NeuCockpit-v1.0-linux-arm64.tar.gz

  # ─────────────────────── macOS ARM64 (Apple Silicon) ───────────────────────
  macos-arm64:
    name: macOS ARM64 DMG (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS ARM64 package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-arm64
          path: dist/release/NeuCockpit-v1.0-macos.dmg

  # ─────────────────────── macOS x64 (Intel) ───────────────────────
  macos-x64:
    name: macOS x64 DMG (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS Intel package
        run: |
          bash scripts/build_neucockpit_macos.sh
          # Rename to distinguish Intel
          mv dist/release/NeuCockpit-v1.0-macos.dmg dist/release/NeuCockpit-v1.0-macos-intel.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-x64
          path: dist/release/NeuCockpit-v1.0-macos-intel.dmg

  # ─────────────────────── Upload all to R2 ───────────────────────
  upload-to-r2:
    name: Upload builds to Cloudflare R2
    runs-on: ubuntu-latest
    needs: [linux-x64, linux-arm64, macos-arm64, macos-x64]
    if: always() && (needs.linux-x64.result == 'success' || needs.linux-arm64.result == 'success' || needs.macos-arm64.result == 'success' || needs.macos-x64.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Install AWS CLI
        run: sudo apt-get update && sudo apt-get install -y awscli

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          echo "=== Available artifacts ==="
          find artifacts/ -type f | head -20

          # Upload Linux x64
          if [ -f "artifacts/NeuCockpit-v1.0-linux-x64/NeuCockpit-v1.0-linux-x64.tar.gz" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-linux-x64/NeuCockpit-v1.0-linux-x64.tar.gz" \
              "s3://zerox-downloads/NeuCockpit-v1.0-linux-x64.tar.gz" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/gzip"
            echo "Uploaded Linux x64"
          fi

          # Upload Linux ARM64
          if [ -f "artifacts/NeuCockpit-v1.0-linux-arm64/NeuCockpit-v1.0-linux-arm64.tar.gz" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-linux-arm64/NeuCockpit-v1.0-linux-arm64.tar.gz" \
              "s3://zerox-downloads/NeuCockpit-v1.0-linux-arm64.tar.gz" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/gzip"
            echo "Uploaded Linux ARM64"
          fi

          # Upload macOS ARM64
          if [ -f "artifacts/NeuCockpit-v1.0-macos-arm64/NeuCockpit-v1.0-macos.dmg" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-macos-arm64/NeuCockpit-v1.0-macos.dmg" \
              "s3://zerox-downloads/NeuCockpit-v1.0-macos-arm64.dmg" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/octet-stream"
            echo "Uploaded macOS ARM64"
          fi

          # Upload macOS Intel
          if [ -f "artifacts/NeuCockpit-v1.0-macos-x64/NeuCockpit-v1.0-macos-intel.dmg" ]; then
            aws s3 cp "artifacts/NeuCockpit-v1.0-macos-x64/NeuCockpit-v1.0-macos-intel.dmg" \
              "s3://zerox-downloads/NeuCockpit-v1.0-macos-intel.dmg" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/octet-stream"
            echo "Uploaded macOS Intel"
          fi

          echo "=== Upload complete ==="

name: NeuCockpit Product Release

on:
  workflow_dispatch:
  push:
    tags:
      - "neucockpit-v*"

env:
  NEURON_SKIP_QWEN_GGUF: "0"   # Bundle the 2.1 GB Qwen GGUF in all builds

jobs:
  # ─────────────────────── Linux x64 ───────────────────────
  linux-x64:
    name: Linux x64 tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-x64
          path: dist/release/NeuCockpit-v1.0-linux-x64.tar.gz

  # ─────────────────────── Linux ARM64 ───────────────────────
  linux-arm64:
    name: Linux ARM64 tarball
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux ARM64 package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-arm64
          path: dist/release/NeuCockpit-v1.0-linux-arm64.tar.gz

  # ─────────────────────── macOS ARM64 (Apple Silicon) ───────────────────────
  macos-arm64:
    name: macOS ARM64 DMG (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS ARM64 package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-arm64
          path: dist/release/NeuCockpit-v1.0-macos-arm64.dmg

  # ─────────────────────── macOS x64 (Intel) ───────────────────────
  macos-x64:
    name: macOS x64 DMG (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS Intel package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-x64
          path: dist/release/NeuCockpit-v1.0-macos-intel.dmg

  # ─────────────────────── Create GitHub Release ───────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-x64, linux-arm64, macos-arm64, macos-x64]
    if: always() && (needs.linux-x64.result == 'success' || needs.linux-arm64.result == 'success' || needs.macos-arm64.result == 'success' || needs.macos-x64.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0.0-build-$(date +%Y%m%d%H%M)"
          TITLE="NeuCockpit v1.0 - Multi-Platform Release"
          BODY="## Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | Linux | x64 | NeuCockpit-v1.0-linux-x64.tar.gz |
          | Linux | ARM64 | NeuCockpit-v1.0-linux-arm64.tar.gz |
          | macOS | Apple Silicon | NeuCockpit-v1.0-macos-arm64.dmg |
          | macOS | Intel | NeuCockpit-v1.0-macos-intel.dmg |
          | Windows | x64 | [Download from zero-x.live](https://downloads.zero-x.live/NeuCockpitSetup_v1.0_windows_x64.exe) |

          Built automatically via GitHub Actions."

          # Create the release
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes "$BODY" \
            --latest

          # Upload each successful artifact
          for f in artifacts/NeuCockpit-v1.0-linux-x64/*.tar.gz; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "${{ github.repository }}" && echo "✅ Uploaded $(basename $f)"
          done

          for f in artifacts/NeuCockpit-v1.0-linux-arm64/*.tar.gz; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "${{ github.repository }}" && echo "✅ Uploaded $(basename $f)"
          done

          for f in artifacts/NeuCockpit-v1.0-macos-arm64/*.dmg; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "${{ github.repository }}" && echo "✅ Uploaded $(basename $f)"
          done

          for f in artifacts/NeuCockpit-v1.0-macos-x64/*.dmg; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --repo "${{ github.repository }}" && echo "✅ Uploaded $(basename $f)"
          done

          echo "=== Release created: $TAG ==="

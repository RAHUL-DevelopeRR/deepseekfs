name: NeuCockpit Product Release

on:
  workflow_dispatch:
    inputs:
      bundle_qwen:
        description: "Bundle Qwen 2.5 Coder GGUF into app packages"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "neucockpit-v*"

env:
  NEUCOCKPIT_RELEASE_CHUNK_BYTES: "1900000000"

jobs:
  linux-x64:
    name: Linux x64 tarball
    runs-on: ubuntu-22.04
    env:
      NEURON_SKIP_QWEN_GGUF: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen == 'false' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxcb-cursor0 libxkbcommon-x11-0
      - name: Build NeuCockpit Linux x64 package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-x64
          path: dist/release/upload/*
          if-no-files-found: error

  linux-arm64:
    name: Linux ARM64 tarball
    runs-on: ubuntu-24.04-arm
    env:
      NEURON_SKIP_QWEN_GGUF: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen == 'false' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-venv \
            python3-pyqt6 \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0
      - name: Build NeuCockpit Linux ARM64 package
        run: bash scripts/build_neucockpit_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-linux-arm64
          path: dist/release/upload/*
          if-no-files-found: error

  macos-arm64:
    name: macOS ARM64 DMG
    runs-on: macos-14
    env:
      NEURON_SKIP_QWEN_GGUF: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen == 'false' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS ARM64 package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-arm64
          path: dist/release/upload/*
          if-no-files-found: error

  macos-intel:
    name: macOS Intel DMG
    runs-on: macos-15-intel
    env:
      NEURON_SKIP_QWEN_GGUF: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen == 'false' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit macOS Intel package
        run: bash scripts/build_neucockpit_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-macos-intel
          path: dist/release/upload/*
          if-no-files-found: error

  windows-arm64:
    name: Windows ARM64 zip
    runs-on: windows-11-arm
    env:
      NEURON_SKIP_QWEN_GGUF: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen == 'false' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build NeuCockpit Windows ARM64 package
        shell: pwsh
        run: scripts/build_neucockpit_windows.ps1 -Arch arm64
      - uses: actions/upload-artifact@v4
        with:
          name: NeuCockpit-v1.0-windows-arm64
          path: dist/release/upload/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [linux-x64, linux-arm64, macos-arm64, macos-intel, windows-arm64]
    if: always() && (needs.linux-x64.result == 'success' || needs.linux-arm64.result == 'success' || needs.macos-arm64.result == 'success' || needs.macos-intel.result == 'success' || needs.windows-arm64.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -printf '%P %s bytes\n' | sort

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_QWEN: ${{ github.event_name == 'workflow_dispatch' && inputs.bundle_qwen || 'true' }}
        run: |
          set -euo pipefail
          TAG="v1.0.0-build-$(date +%Y%m%d%H%M)"
          TITLE="NeuCockpit v1.0 - Multi-Platform Release"
          if [ "$BUNDLE_QWEN" = "true" ]; then
            MODEL_NOTE="These are full offline packages with Qwen 2.5 Coder GGUF bundled. Assets larger than 2GB are split into .part-* files for GitHub Release compatibility."
          else
            MODEL_NOTE="These packages bundle BGE embeddings but do not bundle Qwen; the app can download Qwen 2.5 Coder during setup/first model load."
          fi
          BODY="## Downloads

          $MODEL_NOTE

          Platforms included when their native runner succeeds:
          - Linux x64: NeuCockpit-v1.0-linux-x64.tar.gz
          - Linux ARM64: NeuCockpit-v1.0-linux-arm64.tar.gz
          - macOS ARM64: NeuCockpit-v1.0-macos-arm64.dmg
          - macOS Intel: NeuCockpit-v1.0-macos-intel.dmg
          - Windows ARM64: NeuCockpit-v1.0-windows-arm64.zip

          If an asset has .part-* files, download every part plus the .sha256 and .REASSEMBLE.txt files."

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes "$BODY" \
            --latest

          find artifacts -type f | sort | while read -r f; do
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}"
            echo "Uploaded $(basename "$f")"
          done

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release created: $TAG"

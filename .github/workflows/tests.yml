name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.104.1 pydantic==2.4.2 python-dotenv==1.0.0 numpy==1.26.4 httpx==0.25.2

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

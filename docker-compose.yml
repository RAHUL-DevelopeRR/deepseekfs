# DEPRECATED — Web/Server Deployment Only
# =========================================
# This Compose file deploys the FastAPI web-mode server (run.py + app/main.py).
# It is NOT used for the Windows desktop application (run_desktop.py + PyQt6).

services:
  deepseekfs:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - deepseekfs_storage:/app/storage
    restart: unless-stopped

volumes:
  deepseekfs_storage:
